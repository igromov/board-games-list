<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наши настолки</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="controls">

        <input
                type="search"
                class="search-box"
                id="searchBox"
                placeholder="🔍 Поиск по названию…"
                autocomplete="off"
                aria-label="Поиск по названию игры"
        >

        <!-- Players -->
        <div class="filter-row" role="group" aria-label="Фильтр по количеству игроков">
            <span class="filter-row-label" title="Количество игроков" aria-hidden="true">👥</span>
            <div class="filter-buttons" id="playersFilter">
                <div class="filter-btn" data-value="2"  aria-label="2 игрока">2</div>
                <div class="filter-btn" data-value="3"  aria-label="3 игрока">3</div>
                <div class="filter-btn" data-value="4"  aria-label="4 игрока">4</div>
                <div class="filter-btn" data-value="5"  aria-label="5 игроков">5</div>
                <div class="filter-btn" data-value="6"  aria-label="6 и более игроков">6+</div>
            </div>
        </div>

        <!-- Play time -->
        <div class="filter-row" role="group" aria-label="Фильтр по времени партии">
            <span class="filter-row-label" title="Время партии" aria-hidden="true">⏱️</span>
            <div class="filter-buttons" id="timeFilter">
                <div class="filter-btn" data-value="короткая"  aria-label="Короткая партия до 30 минут">≤30 мин</div>
                <div class="filter-btn" data-value="средняя"   aria-label="Средняя партия 30–60 минут">30–60 мин</div>
                <div class="filter-btn" data-value="длинная"   aria-label="Длинная партия от 60 минут">60+ мин</div>
            </div>
        </div>

        <!-- Learning -->
        <div class="filter-row" role="group" aria-label="Фильтр по времени обучения">
            <span class="filter-row-label" title="Время обучения" aria-hidden="true">🎓</span>
            <div class="filter-buttons" id="learningFilter">
                <div class="filter-btn" data-value="моментально" aria-label="Обучение моментально, до 3 минут">≤3 мин</div>
                <div class="filter-btn" data-value="быстро"      aria-label="Обучение быстро, 5–10 минут">5–10 мин</div>
                <div class="filter-btn" data-value="долго"       aria-label="Обучение долго, от 15 минут">15+ мин</div>
            </div>
        </div>

        <!-- Tags -->
        <div class="tags-section" id="tagsFilter" role="group" aria-label="Фильтр по тегам"></div>

        <button class="reset-btn" onclick="resetFilters()" aria-label="Сбросить все фильтры">
            🔄 Сбросить
        </button>

    </div><!-- /.controls -->

    <div class="games-grid" id="gamesGrid" role="list" aria-live="polite"></div>

    <div class="no-results" id="noResults" style="display:none" role="status">
        <h2>😕 Ничего не найдено</h2>
        <p>Попробуйте изменить критерии поиска или сбросить фильтры</p>
    </div>

</div><!-- /.container -->

<script src="app.js"></script>
</body>
</html>
